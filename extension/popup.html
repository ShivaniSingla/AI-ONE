<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-One</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
<div id="popup-app">

  <!-- ── TOP BAR ── -->
  <header id="popup-topbar">
    <div class="popup-logo">
      <div class="logo-mark">A</div>
      <span class="logo-text">AI-One</span>
    </div>
    <div class="topbar-spacer"></div>
    <button class="icon-btn" id="popupOpenSidebarBtn" title="Open in sidebar">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M10 1v14" stroke="currentColor" stroke-width="1.4"/></svg>
    </button>
    <button class="icon-btn" id="popupHistoryBtn" title="History">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M8 4.5V8l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
    <button class="icon-btn" id="popupNewChatBtn" title="New Chat">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
  </header>

  <!-- ── CONTEXT BANNER ── -->
  <div id="contextBanner">
    <span id="contextEmoji"></span>
    <span id="contextLabel"></span>
  </div>

  <!-- ── VIEWS ── -->

  <!-- HOME VIEW -->
  <section class="popup-view active" id="pview-home">
    <!-- Context panel (shown when extraction succeeds) -->
    <div class="ctx-panel" id="popupContextPanel" hidden></div>
    <div class="popup-suggestions" id="popupSuggestions"></div>
    <div class="popup-input-area">
      <div class="popup-input-wrap">
        <textarea id="popupInput" placeholder="Ask anything…" rows="1"></textarea>
        <button class="send-btn" id="popupSendBtn">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M2 14L14 8 2 2v4.5l8 1.5-8 1.5V14z" fill="white"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- CHAT VIEW -->
  <section class="popup-view" id="pview-chat">
    <!-- Left: messages -->
    <div class="popup-chat-main">
      <div class="popup-messages" id="popupMessages"></div>
      <div class="popup-input-area">
        <div class="popup-input-wrap">
          <textarea id="popupChatInput" placeholder="Type a message…" rows="1"></textarea>
          <button class="send-btn" id="popupChatSendBtn">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M2 14L14 8 2 2v4.5l8 1.5-8 1.5V14z" fill="white"/></svg>
          </button>
        </div>
      </div>
    </div>
    <!-- Right: workflow -->
    <aside class="popup-workflow" id="popupWorkflowPanel">
      <p class="panel-title">Pipeline</p>
      <div class="workflow-list" id="popupWorkflowList">
        <p class="workflow-empty">Send a message.</p>
      </div>
      <div class="task-badge" id="popupTaskBadge" hidden>
        <div class="task-badge-label">Task</div>
        <div class="task-badge-value" id="popupTaskBadgeValue">—</div>
      </div>
    </aside>
  </section>

  <!-- HISTORY VIEW -->
  <section class="popup-view" id="pview-history">
    <div class="history-header">
      <h3>History</h3>
      <button class="text-btn" id="popupClearAllBtn">Clear All</button>
    </div>
    <div class="popup-search-bar">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="#6b7280" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="popupHistorySearch" placeholder="Search…" />
    </div>
    <div class="popup-history-list" id="popupHistoryList"></div>
  </section>

</div>

<script type="module" src="popup.js"></script>
</body>
</html>
