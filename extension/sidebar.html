<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-One Sidebar</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
<div id="sidebar-app">

  <!-- ── TOP BAR ── -->
  <header id="sidebar-topbar">
    <div class="sidebar-logo">
      <div class="logo-mark">A</div>
      <div>
        <div class="logo-text">AI-One</div>
        <div class="logo-sub" id="sidebarContextLabel">AI Companion</div>
      </div>
    </div>
    <div class="topbar-spacer"></div>
    <button class="icon-btn" id="sidebarHistoryBtn" title="History">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M8 4.5V8l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
    <button class="icon-btn" id="sidebarNewChatBtn" title="New Chat">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
    <button class="icon-btn" id="sidebarCloseBtn" title="Close">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
  </header>

  <!-- ── VIEWS ── -->

  <!-- HOME VIEW -->
  <section class="sidebar-view active" id="sview-home">
    <div class="sidebar-home-hero">
      <p class="hero-title">How can I help?</p>
      <p class="hero-sub" id="heroSubText">Select a suggestion or type your question.</p>
    </div>
    <div class="sidebar-suggestions" id="sidebarSuggestions"></div>
    <div class="sidebar-input-area">
      <div class="sidebar-input-wrap">
        <textarea id="sidebarInput" placeholder="Ask anything…" rows="1"></textarea>
        <button class="send-btn" id="sidebarSendBtn">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M2 14L14 8 2 2v4.5l8 1.5-8 1.5V14z" fill="white"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- CHAT VIEW -->
  <section class="sidebar-view" id="sview-chat">
    <div class="sidebar-chat-body">
      <!-- Messages column -->
      <div class="sidebar-messages-col">
        <div class="sidebar-messages" id="sidebarMessages"></div>
        <div class="sidebar-input-area">
          <div class="sidebar-input-wrap">
            <textarea id="sidebarChatInput" placeholder="Type a message…" rows="1"></textarea>
            <button class="send-btn" id="sidebarChatSendBtn">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M2 14L14 8 2 2v4.5l8 1.5-8 1.5V14z" fill="white"/></svg>
            </button>
          </div>
        </div>
      </div>
      <!-- Workflow + Context column -->
      <aside class="sidebar-workflow-panel" id="sidebarWorkflowPanel">
        <!-- Context panel -->
        <div class="ctx-panel" id="sidebarContextPanel" hidden></div>

        <p class="panel-title" style="margin-top:14px;">Workflow Pipeline</p>
        <div class="workflow-list" id="sidebarWorkflowList">
          <p class="workflow-empty">Send a message to see the workflow.</p>
        </div>
        <div class="task-badge" id="sidebarTaskBadge" hidden>
          <div class="task-badge-label">Detected Task</div>
          <div class="task-badge-value" id="sidebarTaskBadgeValue">—</div>
        </div>
      </aside>
    </div>
  </section>

  <!-- HISTORY VIEW -->
  <section class="sidebar-view" id="sview-history">
    <div class="history-header">
      <h3>Conversation History</h3>
      <button class="text-btn" id="sidebarClearAllBtn">Clear All</button>
    </div>
    <div class="sidebar-search-bar">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="#6b7280" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="sidebarHistorySearch" placeholder="Search conversations…" />
    </div>
    <div class="sidebar-history-list" id="sidebarHistoryList"></div>
  </section>

</div>
<script type="module" src="sidebar.js"></script>
</body>
</html>
